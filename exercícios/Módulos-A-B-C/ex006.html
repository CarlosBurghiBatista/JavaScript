<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        body{background-color: chartreuse;}
        div.area{font:normal 30pt Arial;
                 background-color: green;
                 color: white;
                 width: 200px;
                 height: 200px;
                 line-height: 200px;
                 text-align: center;
                 margin-top: 25%;
                 margin-left: 40%;}
   
                
    </style>
</head>
<body>
    <div class="area" onclick="clicar()" onmouseenter="entrou()" onmouseout="saiu()">
       Interaja...
    </div>
    <br><br>
 
    <script>
        var a = window.document.querySelector('div.area')
        function  clicar() {
          a.innerText = 'clicou !'
          a.style.background = 'red'}
       
        function  entrou() {
          a.innerText = 'entrou !'}
   
        function  saiu() {
          a.innerText = 'saiu !'
          a.style.background = 'green'}
    </script>
          
</body>
</html>
