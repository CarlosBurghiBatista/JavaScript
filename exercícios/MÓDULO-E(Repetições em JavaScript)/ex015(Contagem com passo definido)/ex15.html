<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Numérico com passo definido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>CONTADOR NUMÉRICO</h1>
    </header>

    <section>
        <div>
           <p class="p2">INÍCIO: <input type="number" name="ini" id="ini"></p>
           <p class="p2">FIM: <input type="number" name="fim" id="fim"></p>
           <p class="p2"> PASSO: <input type="number" name="pass" id="pass"></p>
           <P><input type="button" value="Contar" onclick="contador()"> </P>    
        </div>

        <div id="res">
            RESULTADO:
        </div>
    </section>

    <footer>
        <p>&copy; Antonio Carlos</p>
    </footer>

    <script src="script.js"></script>
    
</body>
</html>
